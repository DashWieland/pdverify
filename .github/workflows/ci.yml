name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Pure Data (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y puredata

      - name: Install Pure Data (macOS)
        if: runner.os == 'macOS'
        run: brew install --cask pd || true

      # On Windows CI, Pd is not installed and the render smoke tests skip
      # themselves; the pure-NumPy analysis + rewrite tests still run.

      - name: Install package
        run: python -m pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest -q
